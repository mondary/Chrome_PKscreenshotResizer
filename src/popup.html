<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 200px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background-color: #3367d6;
    }
    button:disabled {
      background-color: #ccc;
      cursor: notallowed;
    }
    select {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 12px;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <select id="formatSelect">
    <option value="1200x1200">Chrome Store (1200x1200)</option>
    <option value="1024x1024">Android Store (1024x1024)</option>
    <option value="1024x768">iOS App (1024x768)</option>
    <option value="512x512">macOS App (512x512)</option>
    <option value="1200x630">WordPress (1200x630)</option>
    <option value="1280x720">VSCode Marketplace (1280x720)</option>
  </select>
  <button id="captureBtn">Capturer</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
