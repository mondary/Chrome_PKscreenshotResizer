<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      padding: 0;
      color: #1d1d1f;
    }
    
    .header {
      padding: 16px 20px 12px;
    }
    
    .header h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.2px;
      color: #1d1d1f;
    }
    
    .formats {
      padding: 0 16px 12px;
      max-height: 280px;
      overflow-y: auto;
    }
    
    .format-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 12px;
      margin-bottom: 6px;
      background: white;
      border: 1px solid #eef0f2;
    }
    
    .format-item:hover {
      background: #f1f3f5;
      border-color: #e0e0e0;
    }
    
    .format-item.active {
      background: #007aff;
      color: white;
      border-color: #007aff;
    }
    
    .format-icon {
      margin-right: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      opacity: 0.8;
    }
    
    .format-item.active .format-icon {
      opacity: 1;
      filter: brightness(0) invert(1);
    }
    
    .format-info {
      flex: 1;
    }
    
    .format-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 1px;
    }
    
    .format-size {
      font-size: 11px;
      opacity: 0.6;
    }
    
    .format-item.active .format-size {
      opacity: 0.8;
    }
    
    .check-icon {
      width: 16px;
      height: 16px;
      border: 2px solid #e5e5ea;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    
    .format-item.active .check-icon {
      border-color: white;
      background: white;
    }
    
    .check-icon::after {
      content: '✓';
      color: #007aff;
      font-size: 9px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    
    .format-item.active .check-icon::after {
      opacity: 1;
    }
    
    .capture-section {
      padding: 16px 20px;
      background: white;
      border-top: 1px solid #eef0f2;
    }
    
    .capture-btn {
      width: 100%;
      height: 48px;
      background: linear-gradient(135deg, #007aff 0%, #0056b3 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
    }
    
    .capture-btn:hover {
      background: linear-gradient(135deg, #0056b3 0%, #003d82 100%);
      box-shadow: 0 6px 16px rgba(0, 122, 255, 0.4);
    }
    
    .capture-btn:active {
      transform: scale(0.97);
    }
    
    .capture-btn:disabled {
      background: #d1d1d6;
      box-shadow: none;
      cursor: not-allowed;
    }
    
    #status {
      text-align: center;
      font-size: 11px;
      color: #86868b;
      margin-top: 10px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Capture Screens</h1>
  </div>
  
  <div class="formats">
    <div class="format-item format-btn active" data-format="1200x1200">
      <div class="format-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
      <div class="format-info">
        <div class="format-name">Chrome Store</div>
        <div class="format-size">1200 × 1200</div>
      </div>
      <div class="check-icon"></div>
    </div>
    
    <div class="format-item format-btn" data-format="1024x1024">
      <div class="format-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg></div>
      <div class="format-info">
        <div class="format-name">Android</div>
        <div class="format-size">1024 × 1024</div>
      </div>
      <div class="check-icon"></div>
    </div>
    
    <div class="format-item format-btn" data-format="1024x768">
      <div class="format-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><line x1="12" y1="19" x2="12" y2="19"/></svg></div>
      <div class="format-info">
        <div class="format-name">iOS App</div>
        <div class="format-size">1024 × 768</div>
      </div>
      <div class="check-icon"></div>
    </div>
    
    <div class="format-item format-btn" data-format="512x512">
      <div class="format-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 19h20"/><path d="M4 19V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14"/><path d="M8 7h8"/></svg></div>
      <div class="format-info">
        <div class="format-name">macOS App</div>
        <div class="format-size">512 × 512</div>
      </div>
      <div class="check-icon"></div>
    </div>
    
    <div class="format-item format-btn" data-format="1200x630">
      <div class="format-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>
      <div class="format-info">
        <div class="format-name">WordPress</div>
        <div class="format-size">1200 × 630</div>
      </div>
      <div class="check-icon"></div>
    </div>
    
    <div class="format-item format-btn" data-format="1280x720">
      <div class="format-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 10l5-5-5-5"/><path d="M9 14l-5 5 5 5"/><path d="M15 14l5 5-5 5"/><path d="M9 10l-5-5 5-5"/></svg></div>
      <div class="format-info">
        <div class="format-name">VSCode</div>
        <div class="format-size">1280 × 720</div>
      </div>
      <div class="check-icon"></div>
    </div>
  </div>
  
  <div class="capture-section">
    <button class="capture-btn" id="captureBtn">
      Capture Screenshot
    </button>
    <div id="status"></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
